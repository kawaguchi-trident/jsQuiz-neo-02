name: Quiz 結果コメント

on:
  workflow_run:
    workflows: ['Quiz 自動判定']
    types: [completed]

permissions:
  pull-requests: write
  issues: write
  actions: read

jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Artifact をダウンロード
        uses: actions/download-artifact@v4
        with:
          name: quiz-result
          path: quiz-result
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 結果を読み取り
        id: read
        run: |
          echo "pr_number=$(cat quiz-result/pr_number.txt)" >> "$GITHUB_OUTPUT"
          echo "student_file=$(cat quiz-result/student_file.txt)" >> "$GITHUB_OUTPUT"
          echo "result=$(cat quiz-result/result.txt)" >> "$GITHUB_OUTPUT"

      - name: PR にコメントを投稿
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.read.outputs.pr_number }}', 10);
            const file = '${{ steps.read.outputs.student_file }}';
            const result = '${{ steps.read.outputs.result }}';

            if (!prNumber) {
              core.setFailed(`PR番号が取得できませんでした: "${prNumber}"`);
              return;
            }

            let body;
            if (result === 'passed') {
              body = [
                '## ✅ 合格！',
                '',
                `**${file}** の \`calcChange\` 関数と表示ロジックが正しく動きました。`,
                'お疲れ様でした！',
              ].join('\n');
            } else if (result === 'no_file') {
              body = [
                '## ⚠️ ファイルが見つかりません',
                '',
                '`students/{番号}/index.html` が変更されていません。',
                '正しいフォルダに解答を置いてから、再度 push してください。',
              ].join('\n');
            } else {
              body = [
                '## ❌ 不合格',
                '',
                `**${file}** の \`calcChange\` 関数、または表示ロジックが期待通りに動きませんでした。`,
                '',
                '**確認ポイント**',
                '- `calcChange(payment)` を **`$(function(){})` の外（グローバル）** に定義していますか？（引数は `payment` の1つだけ）',
                '- 関数の中で `#total` の値を `Number()` で数値化して取得していますか？',
                '- `calcChange` は `payment - total` の **数値** を返していますか？',
                '- ボタンクリック時に `calcChange` を呼び出していますか？',
                '- `.result` に `お釣りは〇〇円です` の形式で表示していますか？',
                '- `#payment` の値も `Number()` で数値化していますか？',
                '- `#total` の `value="180"` は変更していませんか？',
                '',
                'コードを修正して再度 push してください。',
              ].join('\n');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
